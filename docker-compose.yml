services:
  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${DOCKER_NODE_IMAGE:-node:22-alpine}
    ports:
      - "${APP_HOST_PORT:-3009}:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3009}
      FMP_API_KEY: ${FMP_API_KEY:-}
      FMP_USE_MOCKS: ${FMP_USE_MOCKS:-true}
      AUTH_SECRET: ${AUTH_SECRET:-}
      ADMIN_PASSPHRASE: ${ADMIN_PASSPHRASE:-}
      AUTH_SECURE_COOKIES: ${AUTH_SECURE_COOKIES:-false}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      DATABASE_URL: postgresql://thesislens:thesislens@postgres:5432/thesislens
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$${HOSTNAME}:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  worker:
    build:
      context: .
      args:
        NODE_IMAGE: ${DOCKER_NODE_IMAGE:-node:22-alpine}
    command: ["node", "scripts/worker.mjs"]
    environment:
      APP_BASE_URL: http://app:3000
      WORKER_REFRESH_INTERVAL_MS: ${WORKER_REFRESH_INTERVAL_MS:-300000}
      FMP_API_KEY: ${FMP_API_KEY:-}
      FMP_USE_MOCKS: ${FMP_USE_MOCKS:-true}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      DATABASE_URL: postgresql://thesislens:thesislens@postgres:5432/thesislens
      REDIS_URL: redis://redis:6379
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thesislens
      POSTGRES_USER: thesislens
      POSTGRES_PASSWORD: thesislens
    volumes:
      - thesislens-postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine

volumes:
  thesislens-postgres:
