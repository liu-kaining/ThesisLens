services:
  app:
    image: thesislens-app
    restart: unless-stopped
    build:
      context: .
      args:
        NODE_IMAGE: ${DOCKER_NODE_IMAGE:-node:22-alpine}
    ports:
      - "${APP_HOST_PORT:-3009}:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3009}
      FMP_API_KEY: ${FMP_API_KEY:-}
      FMP_USE_MOCKS: ${FMP_USE_MOCKS:-false}
      FMP_MIN_REQUEST_INTERVAL_MS: ${FMP_MIN_REQUEST_INTERVAL_MS:-80}
      AUTH_SECRET: ${AUTH_SECRET:-}
      ADMIN_PASSPHRASE: ${ADMIN_PASSPHRASE:-}
      AUTH_SECURE_COOKIES: ${AUTH_SECURE_COOKIES:-false}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://thesislens:thesislens@postgres:5432/thesislens}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$${HOSTNAME}:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  worker:
    image: thesislens-app
    restart: unless-stopped
    command: ["node", "scripts/worker.mjs"]
    environment:
      APP_BASE_URL: http://app:3000
      WORKER_REFRESH_INTERVAL_MS: ${WORKER_REFRESH_INTERVAL_MS:-300000}
      WORKER_MAX_SYMBOLS: ${WORKER_MAX_SYMBOLS:-25}
      WORKER_UNIVERSE_SYNC_INTERVAL_MS: ${WORKER_UNIVERSE_SYNC_INTERVAL_MS:-86400000}
      WORKER_SYSTEM_BATCH_SIZE: ${WORKER_SYSTEM_BATCH_SIZE:-5}
      WORKER_JOB_CLAIM_LIMIT: ${WORKER_JOB_CLAIM_LIMIT:-100}
      FMP_API_KEY: ${FMP_API_KEY:-}
      FMP_USE_MOCKS: ${FMP_USE_MOCKS:-false}
      FMP_MIN_REQUEST_INTERVAL_MS: ${FMP_MIN_REQUEST_INTERVAL_MS:-80}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://thesislens:thesislens@postgres:5432/thesislens}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thesislens}
      POSTGRES_USER: ${POSTGRES_USER:-thesislens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thesislens}
    volumes:
      - thesislens-postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  thesislens-postgres:
